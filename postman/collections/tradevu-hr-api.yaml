                const data = res.data?.uploadDocument;

                pm.test('Status 200', () => pm.response.to.have.status(200));
                pm.test('No errors', () => pm.expect(res.errors).to.be.undefined);
                pm.test('Document created', () => pm.expect(data.id).to.be.a('string'));
