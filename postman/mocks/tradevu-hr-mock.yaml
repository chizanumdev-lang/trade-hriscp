id: mock-tradevu-hr
name: "Tradevu HR - Mock Server"
description: >
  Mock responses for the Tradevu HR GraphQL API.
  Use this when the real backend is unavailable or for isolated frontend testing.

responses:
  - id: mock-register-success
    name: "Register - Success"
    status: OK
    code: 200
    header:
      - key: Content-Type
        value: application/json
      - key: X-Mock-Id
        value: mock-register-success
    body: |
      {
        "data": {
          "register": {
            "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock_payload.mock_signature",
            "user": {
              "id": "mock-user-123",
              "email": "superadmin@tradevu.com",
              "role": "SUPER_ADMIN",
              "organizationId": "mock-org-456",
              "isOrgOwner": true
            }
          }
        }
      }

  - id: mock-login-success
    name: "Login - Success"
    status: OK
    code: 200
    header:
      - key: Content-Type
        value: application/json
    body: |
      {
        "data": {
          "login": {
            "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock_payload.mock_signature",
            "user": {
              "id": "mock-user-123",
              "email": "superadmin@tradevu.com",
              "role": "SUPER_ADMIN",
              "organizationId": "mock-org-456",
              "employeeId": null,
              "isOrgOwner": true
            }
          }
        }
      }

  - id: mock-login-invalid
    name: "Login - Invalid Credentials"
    status: OK
    code: 200
    header:
      - key: Content-Type
        value: application/json
    body: |
      {
        "errors": [
          {
            "message": "Invalid credentials",
            "locations": [{ "line": 1, "column": 18 }],
            "path": ["login"],
            "extensions": { "code": "UNAUTHENTICATED" }
          }
        ],
        "data": null
      }

  - id: mock-me-authenticated
    name: "Me Query - Authenticated"
    status: OK
    code: 200
    header:
      - key: Content-Type
        value: application/json
    body: |
      {
        "data": {
          "me": {
            "id": "mock-user-123",
            "email": "superadmin@tradevu.com",
            "role": "SUPER_ADMIN",
            "organizationId": "mock-org-456",
            "employeeId": null,
            "isOrgOwner": true,
            "lastLogin": "2024-05-26T09:00:00.000Z",
            "avatarUrl": null
          }
        }
      }

  - id: mock-employees-list
    name: "Employees - List"
    status: OK
    code: 200
    header:
      - key: Content-Type
        value: application/json
    body: |
      {
        "data": {
          "employees": [
            {
              "id": "mock-emp-001",
              "employeeCode": "EMP-000001",
              "fullName": "Jane Smith",
              "email": "jane.smith@tradevu.com",
              "jobTitle": "Software Engineer",
              "departmentId": "mock-dept-001",
              "employmentStatus": "ACTIVE",
              "hireDate": "2024-01-15T00:00:00.000Z"
            },
            {
              "id": "mock-emp-002",
              "employeeCode": "EMP-000002",
              "fullName": "John Doe",
              "email": "john.doe@tradevu.com",
              "jobTitle": "Product Manager",
